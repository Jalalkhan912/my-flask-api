  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]                     # Only runs if tests pass
    if: github.ref == 'refs/heads/main'  # Only on pushes to main

    steps:
      - uses: actions/checkout@v4

      # Configure AWS credentials from GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push the Docker image
      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}     # Unique tag per commit
        run: |
          docker build -t $ECR_REGISTRY/flask-api:$IMAGE_TAG .
          docker push  $ECR_REGISTRY/flask-api:$IMAGE_TAG
          # Also tag as "latest" for easy pulling
          docker tag  $ECR_REGISTRY/flask-api:$IMAGE_TAG \
                      $ECR_REGISTRY/flask-api:latest
          docker push $ECR_REGISTRY/flask-api:latest