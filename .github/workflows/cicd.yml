name: Flask CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  ######################################
  # JOB 1: Run tests
  ######################################
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: flake8 app.py --max-line-length=100

      - name: Run tests
        run: pytest test_app.py -v


  ######################################
  # JOB 2: Build & Push Docker Image
  ######################################
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/flask-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/flask-api:$IMAGE_TAG

          docker tag $ECR_REGISTRY/flask-api:$IMAGE_TAG \
                     $ECR_REGISTRY/flask-api:latest

          docker push $ECR_REGISTRY/flask-api:latest


  ######################################
  # JOB 3: Deploy to EC2
  ######################################
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
          script: |
            # Export the variables so the AWS CLI inside the EC2 session picks them up
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=$AWS_REGION
            
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.ECR_REGISTRY }}

            docker pull ${{ secrets.ECR_REGISTRY }}/flask-api:latest

            docker stop flask-api || true
            docker rm flask-api || true

            docker run -d \
              --name flask-api \
              --restart always \
              -p 5000:5000 \
              ${{ secrets.ECR_REGISTRY }}/flask-api:latest

            sleep 5 && curl -f http://localhost:5000/health